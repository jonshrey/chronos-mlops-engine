version: '3.8'

services:
  backend:
    build:
      context: ./demo
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod

  python-bridge:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    depends_on:
      - backend

  frontend:
    build:
      context: ./chronos-ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - python-bridge